<div class="dialog-wrapper">
  <div class="dialog-header">
    <div class="header-title">
      <mat-icon>branding_watermark</mat-icon>
      <h2>{{ isEdit ? 'Editar Marca' : 'Nueva Marca' }}</h2>
    </div>
    <button mat-icon-button class="close-btn" (click)="dialogRef.close()">
      <span class="close-icon">✕</span>
    </button>
  </div>

  <mat-dialog-content>
    <div class="brand-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre</mat-label>
        <input matInput [(ngModel)]="form.name" required placeholder="Ej: Nike, Adidas...">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Descripción</mat-label>
        <textarea matInput [(ngModel)]="form.description" rows="3" placeholder="Descripción de la marca..."></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>URL del Logo</mat-label>
        <input matInput [(ngModel)]="form.logoUrl" placeholder="https://...">
        <mat-icon matSuffix>image</mat-icon>
      </mat-form-field>

      <div class="logo-preview" *ngIf="form.logoUrl">
        <img [src]="form.logoUrl" alt="Preview" (error)="form.logoUrl = ''">
      </div>
    </div>
  </mat-dialog-content>

  <div class="dialog-footer">
    <button mat-button class="cancel-btn" (click)="dialogRef.close()">Cancelar</button>
    <button mat-raised-button class="save-btn" (click)="save()" [disabled]="saving || !form.name">
      <mat-icon *ngIf="saving" class="spinner">sync</mat-icon>
      {{ saving ? 'Guardando...' : (isEdit ? 'Guardar Cambios' : 'Crear Marca') }}
    </button>
  </div>
</div>
