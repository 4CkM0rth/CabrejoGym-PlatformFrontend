<div class="account-container">
  <h1>Mi Cuenta</h1>

  <div class="account-content" *ngIf="currentUser$ | async as user">
    <mat-card class="user-info">
      <mat-card-header>
        <mat-card-title>Información Personal</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <div class="info-row">
          <span class="label">Nombre:</span>
          <strong class="value">{{ user.firstName }} {{ user.lastName }}</strong>
        </div>

        <div class="info-row">
          <span class="label">Email:</span>
          <strong class="value">{{ user.email }}</strong>
        </div>

        <div class="info-row">
          <span class="label">Rol:</span>
          <strong class="value role-badge">{{ user.role }}</strong>
        </div>

        <div class="info-row">
          <span class="label">Estado:</span>
          <span *ngIf="user.isActive" class="status-badge active">Activo</span>
          <span *ngIf="!user.isActive" class="status-badge inactive">Inactivo</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="account-actions">
      <mat-card-header>
        <mat-card-title>Acciones</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <div class="action-item">
          <div class="action-info">
            <span class="action-title">Mis Pedidos</span>
          </div>
          <button mat-flat-button class="action-btn primary-btn" routerLink="/orders">
            Ver
          </button>
        </div>

        <div class="action-item">
          <div class="action-info">
            <span class="action-title">Mis Direcciones</span>
          </div>
          <button mat-flat-button class="action-btn secondary-btn" routerLink="/account/addresses">
            Gestionar
          </button>
        </div>

        <div class="action-item">
          <div class="action-info">
            <span class="action-title">Cambiar Contraseña</span>
          </div>
          <button mat-flat-button class="action-btn disabled-btn" disabled>
            Próximamente
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
