<div class="branches-container">
  <h1>Nuestras Sedes</h1>
  <p class="subtitle">Visitanos en cualquiera de nuestras ubicaciones</p>

  <div class="branches-grid">
    <mat-card class="branch-card" *ngFor="let branch of branches$ | async">
      <div class="branch-image">
        <img [src]="getBranchImage(branch)" [alt]="branch.name" (error)="onImageError($event)">
      </div>
      
      <mat-card-header>
        <mat-card-title>{{ branch.name }}</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <div class="info-item">
          <mat-icon>location_on</mat-icon>
          <span>{{ branch.address }}, {{ branch.city }}</span>
        </div>
        <div class="info-item">
          <mat-icon>phone</mat-icon>
          <span>{{ branch.phone }}</span>
        </div>
        <div class="info-item">
          <mat-icon>email</mat-icon>
          <span>{{ branch.email }}</span>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <button mat-raised-button [routerLink]="['/branches', branch.id]">
          Ver Detalles
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
