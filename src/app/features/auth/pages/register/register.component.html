<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <h1>Crear Cuenta</h1>
      <p>Únete a Cabrejo Gym hoy</p>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        <mat-form-field appearance="outline" class="full-width">
          <input matInput formControlName="firstName" placeholder="Nombre*">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <input matInput formControlName="lastName" placeholder="Apellido*">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <input matInput type="email" formControlName="email" placeholder="Email*">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <input matInput type="password" formControlName="password" placeholder="Contraseña*">
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button 
          mat-raised-button 
          color="primary" 
          type="submit"
          [disabled]="!registerForm.valid || isLoading"
          class="full-width submit-btn">
          <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
          <span *ngIf="!isLoading">Registrarse</span>
        </button>
      </form>

      <p class="login-link">
        ¿Ya tienes cuenta? 
        <a routerLink="/auth/login">Inicia sesión aquí</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
